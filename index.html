<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encore — Time-Loop Boss Fight</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #e0e0e0;
    }
    #game-container {
      width: 960px;
      height: 640px;
    }
    canvas {
      cursor: none;
    }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #555577;
      text-align: center;
    }
    .info span {
      color: #ffdd57;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="480" height="320"></canvas>
  </div>
  <div class="info">
    <span>ENCORE</span> — Each death, your ghost fights beside you.<br>
    [1] Attack &nbsp; [2] Guard &nbsp; [3] Heal &nbsp; [SPACE] Timing
  </div>

  <script type="module">
    import { CANVAS_WIDTH, CANVAS_HEIGHT } from './src/constants.js';
    import { update, draw, handleKeyDown, handleKeyUp } from './src/engine.js';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Scale canvas for crisp pixels
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    canvas.style.width = `${CANVAS_WIDTH * 2}px`;
    canvas.style.height = `${CANVAS_HEIGHT * 2}px`;

    // Input
    window.addEventListener('keydown', (e) => {
      e.preventDefault();
      handleKeyDown(e);
    });
    window.addEventListener('keyup', (e) => {
      handleKeyUp(e);
    });

    // Game loop
    function gameLoop() {
      update();
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      draw(ctx);
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
